<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>タッピー入籍祝い</title>
</head>
<body>
    <div class="Carousel_Container">
    <header>
        <nav></nav>
    </header>
    <section class="CarouselOne">
        <div class="CarouselOne_wrapper">
            <div class="Scroll_Guide">
            <p>右へスクロール</p>
            <div class="Arrow">→</div>
        </div>
            <h1><span>2026.5.5 tue</span><br>
                タッピー<br>入籍祝いの儀<br>
                <span>Super Chill Out Day</span>
            </h1>
        </div>
    </section>

    <section class="CarouselTwo">
        <div class="CarouselTwo_wrapper">
            <h2>タッピー<br>入籍祝いの儀</h2>
            <p class="Prologue">
                ここに文章
            </p>
        </div>
    </section>

    <section class="CarouselThree">
        <div class="CarouselThree_wrapper">
            <h2>Let`s ピクニック</h2>
            <ul class="Setup_Wrap">
                <li class="Setup_list">
                    <p>
                        <span>回収集合</span>
                        タッピーすまーん、
                        みんな拾ってくれー。
                    </p>
                </li>
                <li class="Setup_list">
                    <p>
                        <span>買い出し</span>
                        立派なソーセージ買おう。
                        サランラップも。
                    </p>
                </li>
                <li class="Setup_list">
                    <p>
                        <span>ピクニック飯</span>
                        気持ちえーとこ行って飯食お。
                    </p>
                </li>
            </ul>
        </div>
    </section>

    <section class="CarouselFour">
        <div class="CarouselFour_wrapper">
            <h2>龍入れ</h2>
            <ul class="Setup_Wrap">
                <li class="Setup_list">
                    <p>
                        <span>肩にげんこつ</span>
                        二の腕がしばらく使えなくなるので、関係者に連絡を入れておく。
                    </p>
                </li>
            </ul>
        </div>
    </section>

    <section class="CarouselFive">
        <div class="CarouselFive_wrapper">
            <div class="slideshow">
                <div class="slide" style="background-image: url('images/photo1.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo2.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo3.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo4.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo5.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo6.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo7.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo8.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo9.jpg');"></div>
                <div class="slide" style="background-image: url('images/photo10.jpg');"></div>
            </div>
        </div>
